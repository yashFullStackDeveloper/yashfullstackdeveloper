<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awesome Homepage</title>
  <style>
    /* Resetting default margin and padding */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-top: 100px;
      color: #333;
    }

    p {
      font-size: 1.2rem;
      color: #666;
      margin-top: 20px;
    }

    .cta-button {
      display: inline-block;
      padding: 10px 20px;
      background-color: #FF5733;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 30px;
      transition: background-color 0.3s ease;
    }

    .cta-button:hover {
      background-color: #FF8C66;
    }

    /* Animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animated {
      animation: fadeInUp 1s ease-out;
    }

    /* Additional styling for illustration */
    .illustration {
      width: 100%;
      max-width: 600px;
      margin: 50px auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="animated">Welcome to my home PAGE</h1>
    <p class="animated"></p>
    <a href="./backpage.html" class="cta-button animated">Get Started</a>
    <img src="illustration.png" alt="Illustration" class="illustration animated">
  </div>
</body>
</html>
