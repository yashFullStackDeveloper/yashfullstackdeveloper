<!DOCTYPE html>
<html>

<head>
    <title>Lottery: The Game</title>
    <style>
        /* main box */
        .main-container {
            background-color: rgb(166, 255, 254);
            width: 80vw;
            margin-left: 15vw;
            height: 40vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border-radius: 20px;
            box-shadow: 10px 10px 90px rgb(228, 0, 0);
            margin-top: 5px;
        }



        .input-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .display {
            width: 90%;
            height: 60%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            margin-top: 45px;
            padding: 20px;
            margin-left: 30px;
        }

        .input-box {
            height: 44px;
            width: 80%;
            font-size: 22px;
            margin-top: 20px;
            border-radius: 20px;
        }


        .button {
            width: 80%;
            margin: 20px;
            height: 44px;
            background-color: rgb(255, 238, 0);
            font-size: 22px;
            border: none;
            border-radius: 20px;
            color: rgb(255, 0, 0);
            box-shadow: 0px 0px 26px;
        }
    </style>
    <script>
        function startplay() {
            let y = prompt("tables");
             let = Number(y)

            let x = 1;
            while (x <= 10) {
                console.log(x * y);

                x++;
            }
        }



    </script>

</head>

<body style="margin: 0px">
    <div class="main-container">
        <div class="display" id="display">
            <h1 class="display-text" id="display-text"></h1>
            <div id="loader" class="loader"></div>
        </div>
        <div class="input-container">
            <input id="input" type="number" class="input-box" placeholder="Bet number" />
            <input id="coins" type="number" class="input-box" placeholder="coins" />

            <button class="button" onclick="startplay()">click me</button>


        </div>
    </div>
</body>

</html>
