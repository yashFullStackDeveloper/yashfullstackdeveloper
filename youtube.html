<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    
    header {
      background-color: #ff0000;
      color: #fff;
      padding: 10px 20px;
    }
    
    header h1 {
      margin: 0;
    }
    
    .container {
      display: flex;
    }
    
    .sidebar {
      width: 20%;
      background-color: #f1f1f1;
      padding: 20px;
    }
    
    .content {
      flex: 1;
      padding: 20px;
    }
    
    .video {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
    }
    
    .video iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>YouTube</h1>
  </header>
  <div class="container">
    <div class="sidebar">
      <h2>Sidebar</h2>
      <!-- Sidebar content goes here -->
    </div>
    <div class="content">
      <h2>Main Content</h2>
      <div class="video">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
      </div>
      <!-- Additional content goes here -->
    </div>
  </div>
</body>
</html>
